<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="page-left" x1="24" y1="40" x2="62" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="page-right" x1="66" y1="40" x2="104" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="spark" x1="82" y1="38" x2="102" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Book spine shadow -->
  <rect x="62" y="36" width="4" height="60" rx="2" fill="#4338ca" opacity="0.3"/>

  <!-- Left page -->
  <path d="M28 42 C28 39, 30 37, 33 37 L60 37 C62 37, 62 37, 62 39 L62 92 C62 94, 60 94, 58 93 C52 90, 42 88, 33 88 C30 88, 28 86, 28 84 Z" fill="url(#page-left)"/>

  <!-- Left page text lines (complex/dense) -->
  <rect x="34" y="46" width="22" height="2.5" rx="1.25" fill="#6366f1" opacity="0.3"/>
  <rect x="34" y="52" width="20" height="2.5" rx="1.25" fill="#6366f1" opacity="0.25"/>
  <rect x="34" y="58" width="23" height="2.5" rx="1.25" fill="#6366f1" opacity="0.2"/>
  <rect x="34" y="64" width="18" height="2.5" rx="1.25" fill="#6366f1" opacity="0.15"/>
  <rect x="34" y="70" width="21" height="2.5" rx="1.25" fill="#6366f1" opacity="0.12"/>
  <rect x="34" y="76" width="16" height="2.5" rx="1.25" fill="#6366f1" opacity="0.1"/>

  <!-- Right page -->
  <path d="M66 39 C66 37, 66 37, 68 37 L95 37 C98 37, 100 39, 100 42 L100 84 C100 86, 98 88, 95 88 C86 88, 76 90, 70 93 C68 94, 66 94, 66 92 Z" fill="url(#page-right)"/>

  <!-- Right page text lines (simplified/clear) -->
  <rect x="72" y="48" width="22" height="3" rx="1.5" fill="#4f46e5" opacity="0.5"/>
  <rect x="72" y="58" width="18" height="3" rx="1.5" fill="#4f46e5" opacity="0.45"/>
  <rect x="72" y="68" width="20" height="3" rx="1.5" fill="#4f46e5" opacity="0.4"/>

  <!-- Sparkle/star (top-right of book) - represents simplification magic -->
  <g transform="translate(94, 28)">
    <!-- Main 4-point star -->
    <path d="M0 -10 C1 -3, 3 -1, 10 0 C3 1, 1 3, 0 10 C-1 3, -3 1, -10 0 C-3 -1, -1 -3, 0 -10Z" fill="url(#spark)"/>
    <!-- Small accent sparkle -->
    <path d="M10 -8 C10.3 -6, 11 -5.3, 13 -5 C11 -4.7, 10.3 -4, 10 -2 C9.7 -4, 9 -4.7, 7 -5 C9 -5.3, 9.7 -6, 10 -8Z" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Small "E" letter accent on the right page -->
  <text x="79" y="83" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" fill="#4f46e5" opacity="0.35">Ee</text>
</svg>
